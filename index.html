<style>
:root {
  --chinar-green: #2C3E2D;
  --deep-forest: #1A2B1C;
  --saffron: #C17F3A;
  --walnut-gold: #D4A054;
  --dal-teal: #7B9E8C;
  --papier: #F5F0E8;
  --papier-dark: #EDE6D8;
  --text-dark: #1A2B1C;
  --text-mid: #4A5C4B;
  --text-light: #7B9E8C;
  --white: #FFFFFF;
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--papier);
  color: var(--text-dark);
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 0 5%;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: all 0.4s ease;
}

nav.scrolled {
  background: rgba(26, 43, 28, 0.97);
  backdrop-filter: blur(12px);
  box-shadow: 0 2px 30px rgba(0,0,0,0.3);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  overflow: hidden;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
}

.nav-logo-name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  line-height: 1;
}

.nav-logo-tag {
  font-size: 9px;
  color: var(--walnut-gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  line-height: 1;
  margin-top: 3px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.02em;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--walnut-gold); }

.nav-cta {
  background: var(--saffron);
  color: var(--white) !important;
  padding: 9px 20px;
  border-radius: 8px;
  font-weight: 500 !important;
  font-size: 13px !important;
  transition: background 0.2s !important;
}

.nav-cta:hover { background: var(--walnut-gold) !important; color: var(--deep-forest) !important; }

/* ===== HERO ===== */
.hero {
  position: relative;
  height: 100vh;
  min-height: 700px;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1566552881560-0be862a7c445?w=1800&q=80');
  background-size: cover;
  background-position: center 40%;
  transform: scale(1.05);
  animation: heroZoom 20s ease-in-out infinite alternate;
}

@keyframes heroZoom {
  from { transform: scale(1.05); }
  to { transform: scale(1.12); }
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(26, 43, 28, 0.88) 0%,
    rgba(26, 43, 28, 0.65) 50%,
    rgba(193, 127, 58, 0.3) 100%
  );
}

/* Chinar pattern overlay */
.hero-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 5 C30 20 10 25 15 40 C20 55 35 50 40 75 C45 50 60 55 65 40 C70 25 50 20 40 5Z' fill='%23ffffff'/%3E%3C/svg%3E");
  background-size: 80px 80px;
}

.hero-logo-mark {
  margin-bottom: 20px;
  animation: heroIn 0.8s ease-out;
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 8%;
  max-width: 900px;
  animation: heroIn 1.2s ease-out;
}

@keyframes heroIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(193, 127, 58, 0.2);
  border: 1px solid rgba(193, 127, 58, 0.4);
  border-radius: 30px;
  padding: 6px 16px;
  margin-bottom: 24px;
}

.hero-badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--walnut-gold);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hero-badge span {
  font-size: 12px;
  color: var(--walnut-gold);
  font-weight: 500;
  letter-spacing: 0.05em;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(42px, 6vw, 80px);
  font-weight: 700;
  color: var(--white);
  line-height: 1.08;
  margin-bottom: 12px;
}

.hero-title em {
  font-style: italic;
  color: var(--walnut-gold);
}

.hero-sub {
  font-family: var(--font-display);
  font-size: clamp(16px, 2.5vw, 24px);
  font-weight: 400;
  font-style: italic;
  color: rgba(255,255,255,0.7);
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

.hero-desc {
  font-size: 16px;
  color: rgba(255,255,255,0.75);
  line-height: 1.7;
  max-width: 560px;
  margin-bottom: 40px;
}

.hero-ctas {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--saffron);
  color: var(--white);
  padding: 14px 28px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.01em;
}

.btn-primary:hover {
  background: var(--walnut-gold);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(193, 127, 58, 0.4);
}

.btn-outline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  padding: 14px 28px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 400;
  text-decoration: none;
  border: 1.5px solid rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.25s;
}

.btn-outline:hover {
  border-color: var(--walnut-gold);
  color: var(--walnut-gold);
  transform: translateY(-2px);
}

/* Hero stats */
.hero-stats {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: rgba(26, 43, 28, 0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(193, 127, 58, 0.2);
}

.hero-stat {
  padding: 22px 28px;
  border-right: 1px solid rgba(255,255,255,0.08);
  text-align: center;
}

.hero-stat:last-child { border-right: none; }

.hero-stat-val {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--walnut-gold);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.04em;
}

/* ===== SUBSIDY BANNER ===== */
.subsidy-banner {
  background: var(--chinar-green);
  padding: 20px 8%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  text-align: center;
}

.subsidy-banner-icon {
  width: 40px;
  height: 40px;
  background: var(--saffron);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.subsidy-banner-text {
  font-size: 15px;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
}

.subsidy-banner-text strong {
  color: var(--walnut-gold);
  font-weight: 600;
}

.subsidy-banner-btn {
  background: var(--saffron);
  color: var(--white);
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.2s;
}

.subsidy-banner-btn:hover { background: var(--walnut-gold); }

/* ===== SECTION COMMONS ===== */
section { padding: 90px 8%; }

.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.eyebrow-line {
  width: 32px;
  height: 2px;
  background: var(--saffron);
  border-radius: 2px;
}

.eyebrow-text {
  font-size: 11px;
  font-weight: 600;
  color: var(--saffron);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(30px, 4vw, 48px);
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.15;
  margin-bottom: 16px;
}

.section-title em {
  font-style: italic;
  color: var(--saffron);
}

.section-desc {
  font-size: 16px;
  color: var(--text-mid);
  line-height: 1.75;
  max-width: 600px;
}

/* ===== WHY VALLEY ===== */
.why-section {
  background: var(--white);
  padding: 90px 8%;
}

.why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
  margin-top: 56px;
}

.why-image-wrap {
  position: relative;
}

.why-image-main {
  width: 100%;
  height: 480px;
  object-fit: cover;
  border-radius: 20px;
  display: block;
}

.why-image-badge {
  position: absolute;
  bottom: -20px;
  right: -20px;
  background: var(--chinar-green);
  border-radius: 16px;
  padding: 18px 22px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(26,43,28,0.3);
}

.why-image-badge-val {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  color: var(--walnut-gold);
  display: block;
  line-height: 1;
}

.why-image-badge-label {
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
}

.why-accent-card {
  position: absolute;
  top: 24px;
  left: -24px;
  background: var(--saffron);
  border-radius: 12px;
  padding: 14px 18px;
  box-shadow: 0 8px 24px rgba(193,127,58,0.4);
}

.why-accent-card-val {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  display: block;
}

.why-accent-card-label {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  margin-top: 2px;
}

.why-features {
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin-top: 40px;
}

.why-feature {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.why-feature-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.why-feature-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 4px;
}

.why-feature-desc {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.6;
}

/* ===== SERVICES ===== */
.services-section {
  background: var(--papier);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 56px;
}

.service-card {
  background: var(--white);
  border-radius: 18px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: default;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(26,43,28,0.12);
}

.service-card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

.service-card-body {
  padding: 24px;
}

.service-card-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}

.service-card-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 8px;
}

.service-card-desc {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 16px;
}

.service-card-link {
  font-size: 13px;
  font-weight: 600;
  color: var(--saffron);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: gap 0.2s;
}

.service-card-link:hover { gap: 10px; }

/* ===== SUBSIDY SECTION ===== */
.subsidy-section {
  background: var(--deep-forest);
  position: relative;
  overflow: hidden;
}

.subsidy-bg-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.05;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 3 C22 15 8 18 11 30 C14 42 26 38 30 57 C34 38 46 42 49 30 C52 18 38 15 30 3Z' fill='%23ffffff'/%3E%3C/svg%3E");
  background-size: 60px 60px;
}

.subsidy-section .section-title { color: var(--white); }
.subsidy-section .section-desc { color: rgba(255,255,255,0.65); }
.subsidy-section .eyebrow-text { color: var(--walnut-gold); }
.subsidy-section .eyebrow-line { background: var(--walnut-gold); }

.subsidy-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 48px;
}

.subsidy-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
}

.subsidy-card.featured {
  background: var(--saffron);
  border-color: var(--saffron);
}

.subsidy-card:hover:not(.featured) {
  background: rgba(255,255,255,0.1);
  border-color: rgba(193,127,58,0.4);
}

.subsidy-card-kw {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--walnut-gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.subsidy-card.featured .subsidy-card-kw { color: rgba(255,255,255,0.85); }

.subsidy-card-price {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
  line-height: 1;
}

.subsidy-card-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 14px;
}

.subsidy-card.featured .subsidy-card-label { color: rgba(255,255,255,0.8); }

.subsidy-amount {
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 10px;
}

.subsidy-card.featured .subsidy-amount {
  background: rgba(255,255,255,0.2);
}

.subsidy-amount-label {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.subsidy-card.featured .subsidy-amount-label { color: rgba(255,255,255,0.8); }

.subsidy-amount-val {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--walnut-gold);
  margin-top: 2px;
}

.subsidy-card.featured .subsidy-amount-val { color: var(--white); }

.featured-badge {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--walnut-gold);
  color: var(--deep-forest);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

.subsidy-note {
  margin-top: 28px;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 18px 22px;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
  text-align: center;
}

.subsidy-note strong { color: var(--walnut-gold); }

/* ===== CALCULATOR SECTION ===== */
.calc-section {
  background: var(--papier-dark);
}

.calc-wrapper {
  margin-top: 48px;
  background: var(--white);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(26,43,28,0.1);
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

.calc-header-bar {
  background: var(--chinar-green);
  padding: 24px 32px;
}

.calc-header-bar h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 4px;
}

.calc-header-bar p {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}

.calc-body { padding: 32px; }

.calc-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.sys-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.sys-btn {
  border: 1.5px solid #e0ddd5;
  border-radius: 10px;
  padding: 10px 18px;
  cursor: pointer;
  background: var(--papier);
  transition: all 0.2s;
  text-align: center;
  min-width: 70px;
}

.sys-btn:hover { border-color: var(--saffron); }

.sys-btn.active {
  border-color: var(--chinar-green);

}

.sys-btn .kw { font-size: 16px; font-weight: 700; color: var(--text-dark); }

.sys-btn.active .kw-sub { color: rgba(255,255,255,0.65); }
.sys-btn .kw-ideal { font-size: 9px; color: var(--saffron); font-weight: 500; margin-top: 3px; }
.sys-btn.active .kw-ideal { color: var(--walnut-gold); }

.bill-slider-wrap { margin-bottom: 28px; }

.bill-slider-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.bill-display {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--chinar-green);
}

input[type=range].styled {
  width: 100%;
  accent-color: var(--chinar-green);
  height: 4px;
}

.slider-hints {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-light);
  margin-top: 6px;
}

.calc-results {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.calc-res-card {
  background: var(--papier);
  border-radius: 12px;
  padding: 16px 18px;
}

.calc-res-card.green { background: var(--chinar-green); }
.calc-res-card.gold { background: var(--saffron); }

.calc-res-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.calc-res-card.green .calc-res-label { color: rgba(255,255,255,0.6); }
.calc-res-card.gold .calc-res-label { color: rgba(255,255,255,0.75); }

.calc-res-val {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-dark);
}

.calc-res-card.green .calc-res-val { color: var(--white); }
.calc-res-card.gold .calc-res-val { color: var(--white); }

.calc-res-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.calc-res-card.green .calc-res-sub { color: rgba(255,255,255,0.5); }
.calc-res-card.gold .calc-res-sub { color: rgba(255,255,255,0.7); }

.calc-breakdown {
  background: var(--papier);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
}

.calc-bk-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  font-size: 13px;
}

.calc-bk-row:last-child { border-bottom: none; }
.calc-bk-row span:first-child { color: var(--text-mid); }
.calc-bk-row span:last-child { font-weight: 500; color: var(--text-dark); }
.calc-bk-row .pos { color: #2e7d32; }
.calc-bk-row .bold { font-weight: 700; font-size: 14px; }
.calc-bk-row .gold { color: var(--saffron); }

.calc-lifetime {
  background: linear-gradient(135deg, var(--chinar-green), var(--deep-forest));
  border-radius: 14px;
  padding: 20px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.calc-lt-label { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
.calc-lt-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--walnut-gold); }
.calc-lt-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 4px; }
.calc-lt-r-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; text-align: right; }
.calc-lt-r-val { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--dal-teal); text-align: right; }

.calc-cta-wrap {
  display: flex;
  gap: 12px;
}

.calc-disclaimer {
  font-size: 11px;
  color: var(--text-light);
  line-height: 1.6;
  margin-top: 16px;
  text-align: center;
}

/* ===== CULTURE SECTION ===== */
.culture-section {
  background: var(--chinar-green);
  padding: 90px 8%;
  position: relative;
  overflow: hidden;
}

.culture-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1587474260584-136574528ed5?w=1600&q=70');
  background-size: cover;
  background-position: center;
  opacity: 0.15;
}

.culture-section .section-title { color: var(--white); }
.culture-section .eyebrow-text { color: var(--walnut-gold); }
.culture-section .eyebrow-line { background: var(--walnut-gold); }

.culture-quote {
  position: relative;
  z-index: 2;
  max-width: 700px;
}

.culture-quote-text {
  font-family: var(--font-display);
  font-size: clamp(22px, 3vw, 36px);
  font-weight: 400;
  font-style: italic;
  color: var(--white);
  line-height: 1.5;
  margin: 24px 0;
}

.culture-quote-attr {
  font-size: 13px;
  color: var(--walnut-gold);
  letter-spacing: 0.06em;
}

.culture-images {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 56px;
  position: relative;
  z-index: 2;
}

.culture-img-wrap {
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}

.culture-img-wrap:first-child { grid-row: span 2; }

.culture-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s;
}

.culture-img-wrap:first-child .culture-img { height: 100%; min-height: 416px; }

.culture-img-wrap:hover .culture-img { transform: scale(1.05); }

.culture-img-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(26,43,28,0.85));
  padding: 20px 16px 14px;
}

.culture-img-caption {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  font-style: italic;
}

/* ===== PROCESS ===== */
.process-section { background: var(--white); }

.process-steps {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  margin-top: 56px;
  position: relative;
}

.process-steps::before {
  content: '';
  position: absolute;
  top: 30px;
  left: 10%;
  right: 10%;
  height: 2px;
  background: linear-gradient(90deg, var(--saffron), var(--dal-teal));
  z-index: 0;
}

.process-step {
  text-align: center;
  position: relative;
  z-index: 1;
  padding: 0 16px;
}

.process-step-num {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--chinar-green);
  color: var(--white);
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  border: 3px solid var(--papier);
  box-shadow: 0 4px 16px rgba(26,43,28,0.2);
}

.process-step:nth-child(2) .process-step-num { background: var(--dal-teal); }
.process-step:nth-child(3) .process-step-num { background: var(--saffron); }
.process-step:nth-child(4) .process-step-num { background: var(--walnut-gold); }
.process-step:nth-child(5) .process-step-num { background: var(--chinar-green); }

.process-step-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 6px;
}

.process-step-desc {
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.55;
}

/* ===== TESTIMONIALS ===== */
.testimonials-section { background: var(--papier); }

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 48px;
}

.testimonial-card {
  background: var(--white);
  border-radius: 16px;
  padding: 28px;
  position: relative;
  transition: transform 0.3s, box-shadow 0.3s;
}

.testimonial-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(26,43,28,0.1);
}

.testimonial-quote-mark {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  color: var(--papier-dark);
  line-height: 0.8;
  position: absolute;
  top: 20px;
  right: 24px;
}

.testimonial-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
}

.star { color: var(--walnut-gold); font-size: 14px; }

.testimonial-text {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.7;
  margin-bottom: 20px;
  position: relative;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.testimonial-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--chinar-green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--walnut-gold);
  flex-shrink: 0;
}

.testimonial-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dark);
}

.testimonial-location {
  font-size: 12px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.testimonial-tag {
  background: var(--papier);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  color: var(--saffron);
  font-weight: 500;
  margin-top: 6px;
  display: inline-block;
}

/* ===== CONTACT ===== */
.contact-section {
  background: var(--deep-forest);
  padding: 90px 8%;
  position: relative;
  overflow: hidden;
}

.contact-bg {
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1609137144813-7d9921338f24?w=1600&q=70');
  background-size: cover;
  background-position: center top;
  opacity: 0.12;
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  position: relative;
  z-index: 2;
  align-items: center;
}

.contact-section .section-title { color: var(--white); }
.contact-section .section-desc { color: rgba(255,255,255,0.6); }
.contact-section .eyebrow-text { color: var(--walnut-gold); }
.contact-section .eyebrow-line { background: var(--walnut-gold); }

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 36px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.contact-item-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--walnut-gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.contact-item-val {
  font-size: 15px;
  color: var(--white);
  font-weight: 500;
}

.contact-form-card {
  background: var(--white);
  border-radius: 20px;
  padding: 36px;
}

.contact-form-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 24px;
}

.form-group { margin-bottom: 16px; }

.form-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e0ddd5;
  border-radius: 10px;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-dark);
  background: var(--papier);
  transition: border-color 0.2s;
  outline: none;
}

.form-input:focus { border-color: var(--chinar-green); }

.form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #e0ddd5;
  border-radius: 10px;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-dark);
  background: var(--papier);
  outline: none;
  cursor: pointer;
  appearance: none;
  transition: border-color 0.2s;
}

.form-select:focus { border-color: var(--chinar-green); }

/* ===== FOOTER ===== */
footer {
  background: var(--deep-forest);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 48px 8% 28px;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

.footer-brand-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.footer-brand-tag {
  font-size: 11px;
  color: var(--walnut-gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.footer-brand-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  line-height: 1.65;
  margin-bottom: 20px;
}

.footer-social {
  display: flex;
  gap: 10px;
}

.footer-social-btn {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: background 0.2s;
}

.footer-social-btn:hover { background: var(--saffron); }

.footer-col-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.footer-links {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.footer-links a {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-links a:hover { color: var(--walnut-gold); }

.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.footer-bottom-text {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}

.footer-bottom-badge {
  background: rgba(193,127,58,0.15);
  border: 1px solid rgba(193,127,58,0.25);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 11px;
  color: var(--walnut-gold);
}

/* ===== WHATSAPP FLOAT ===== */
.wa-float {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

.wa-label {
  background: var(--chinar-green);
  color: var(--white);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(26,43,28,0.3);
  animation: waBounce 3s ease-in-out infinite;
}

@keyframes waBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

.wa-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: #25D366;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  box-shadow: 0 6px 24px rgba(37, 211, 102, 0.4);
  transition: transform 0.3s;
}

.wa-btn:hover { transform: scale(1.1); }

/* ===== PAGE LOADER ===== */
#page-loader {
  position: fixed;
  inset: 0;
  background: var(--deep-forest);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

#page-loader.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  animation: loaderPulse 1.5s ease-in-out infinite;
}

@keyframes loaderPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}

.loader-text {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--white);
  letter-spacing: 0.05em;
}

.loader-sub {
  font-size: 12px;
  color: var(--walnut-gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.loader-bar-wrap {
  width: 160px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.loader-bar {
  height: 100%;
  background: var(--saffron);
  border-radius: 3px;
  animation: loaderBar 1.4s ease-in-out forwards;
}

@keyframes loaderBar {
  from { width: 0%; }
  to { width: 100%; }
}

/* ===== MOBILE MENU ===== */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: white;
  border-radius: 2px;
  transition: all 0.3s;
}

.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed;
  top: 72px;
  left: 0;
  right: 0;
  background: rgba(26, 43, 28, 0.98);
  backdrop-filter: blur(16px);
  z-index: 999;
  padding: 24px 8%;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid rgba(255,255,255,0.08);
  transform: translateY(-20px);
  opacity: 0;
  transition: all 0.3s ease;
}

.mobile-menu.open {
  display: flex;
  transform: translateY(0);
  opacity: 1;
}

.mobile-menu a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 16px;
  font-weight: 400;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  transition: color 0.2s;
}

.mobile-menu a:hover { color: var(--walnut-gold); }

.mobile-menu .mobile-cta {
  margin-top: 16px;
  background: var(--saffron);
  color: white !important;
  text-align: center;
  padding: 14px !important;
  border-radius: 10px;
  font-weight: 500 !important;
  border: none !important;
}

/* ===== SCROLL ANIMATIONS ===== */
.fade-up {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

.fade-up-delay-1 { transition-delay: 0.1s; }
.fade-up-delay-2 { transition-delay: 0.2s; }
.fade-up-delay-3 { transition-delay: 0.3s; }
.fade-up-delay-4 { transition-delay: 0.4s; }

/* ===== COUNTER ANIMATION ===== */
.count-up { font-variant-numeric: tabular-nums; }

/* ===== ACTIVE NAV LINK ===== */
.nav-links a.active { color: var(--walnut-gold); }

/* ===== SCROLL TO TOP ===== */
.scroll-top {
  position: fixed;
  bottom: 100px;
  right: 28px;
  z-index: 998;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--chinar-green);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(26,43,28,0.3);
}

.scroll-top.show {
  opacity: 1;
  transform: translateY(0);
}

.scroll-top:hover { background: var(--saffron); transform: translateY(-2px); }

/* ===== ANNOUNCEMENT STRIP ===== */
.announcement {
  background: var(--saffron);
  padding: 10px 8%;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
  z-index: 999;
}

.announcement a {
  color: white;
  font-weight: 700;
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ===== GALLERY SECTION ===== */
.gallery-section {
  background: var(--white);
  padding: 80px 8%;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto auto;
  gap: 14px;
  margin-top: 48px;
}

.gallery-item {
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  background: var(--papier);
}

.gallery-item:first-child {
  grid-column: span 2;
  grid-row: span 2;
}

.gallery-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}

.gallery-item:first-child .gallery-img {
  height: 100%;
  min-height: 414px;
}

.gallery-item:hover .gallery-img { transform: scale(1.06); }

.gallery-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(26,43,28,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: flex-end;
  padding: 16px;
}

.gallery-item:hover .gallery-overlay { opacity: 1; }

.gallery-caption {
  font-size: 12px;
  color: white;
  font-style: italic;
}

@media (max-width: 900px) {
  .hamburger { display: flex; }
  .nav-links { display: none; }
  .gallery-grid { grid-template-columns: 1fr 1fr; }
  .gallery-item:first-child { grid-column: span 2; }
  .gallery-item:first-child .gallery-img { min-height: 220px; }
}

</head>

<script>
  // ===== PAGE LOADER =====
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('page-loader');
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 700);
    }, 1500);
  });

  // ===== NAVBAR SCROLL =====
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 60);
    document.getElementById('scroll-top').classList.toggle('show', window.scrollY > 400);
  });
  navbar.classList.add('scrolled');

  // ===== MOBILE MENU =====
  function toggleMobile() {
    const menu = document.getElementById('mobile-menu');
    const ham = document.getElementById('hamburger');
    const isOpen = menu.classList.contains('open');
    if (isOpen) {
      menu.classList.remove('open');
      ham.classList.remove('open');
    } else {
      menu.classList.add('open');
      ham.classList.add('open');
    }
  }

  function closeMobile() {
    document.getElementById('mobile-menu').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  // ===== SCROLL ANIMATIONS =====
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

  // ===== COUNTER ANIMATION =====
  function animateCounter(el, target, prefix, suffix, duration) {
    const start = performance.now();
    const isDecimal = target % 1 !== 0;
    function update(time) {
      const elapsed = Math.min((time - start) / duration, 1);
      const eased = 1 - Math.pow(1 - elapsed, 3);
      const val = isDecimal ? (eased * target).toFixed(1) : Math.floor(eased * target);
      el.textContent = prefix + val.toLocaleString('en-IN') + suffix;
      if (elapsed < 1) requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  }

  const statsObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const stats = entry.target.querySelectorAll('.hero-stat-val');
        const data = [
          { val: 90, prefix: '', suffix: '+' },
          { val: 94800, prefix: '₹', suffix: '' },
          { val: 25, prefix: '', suffix: ' yrs' },
          { val: 5, prefix: '', suffix: ' ★' },
        ];
        stats.forEach((el, i) => {
          if (data[i]) animateCounter(el, data[i].val, data[i].prefix, data[i].suffix, 1800);
        });
        statsObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.5 });

  const heroStats = document.querySelector('.hero-stats');
  if (heroStats) statsObserver.observe(heroStats);

  // ===== ACTIVE NAV HIGHLIGHT =====
  const sections = document.querySelectorAll('section[id], div[id]');
  const navLinks = document.querySelectorAll('.nav-links a');

  window.addEventListener('scroll', () => {
    let current = '';
    sections.forEach(section => {
      if (window.scrollY >= section.offsetTop - 120) current = section.id;
    });
    navLinks.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === '#' + current);
    });
  });

  // ===== ADD FADE-UP TO ALL KEY ELEMENTS =====
  document.querySelectorAll('.service-card, .subsidy-card, .testimonial-card, .why-feature, .process-step').forEach((el, i) => {
    el.classList.add('fade-up');
    if (i % 3 === 1) el.classList.add('fade-up-delay-1');
    if (i % 3 === 2) el.classList.add('fade-up-delay-2');
    observer.observe(el);
  });

  // ===== CALCULATOR LOGIC =====
  const systems = {
    3:  { price: 159000, subsidy: 94800, centralSub: 78000, jkSub: 16800, note: "Full ₹94,800 subsidy applies" },
    5:  { price: 258000, subsidy: 94800, centralSub: 78000, jkSub: 16800, note: "Subsidy capped at ₹94,800 (3kW limit)" },
    6:  { price: 308000, subsidy: 94800, centralSub: 78000, jkSub: 16800, note: "Subsidy capped at ₹94,800 (3kW limit)" },
    7:  { price: 357000, subsidy: 94800, centralSub: 78000, jkSub: 16800, note: "Subsidy capped at ₹94,800 (3kW limit)" },
    10: { price: 506000, subsidy: 94800, centralSub: 78000, jkSub: 16800, note: "Subsidy capped at ₹94,800 (3kW limit)" },
  };

  let curKW = 5, curBill = 2500;

  function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

  function calcEMI(p, r, n) {
    const mr = r / 12 / 100;
    return p * mr * Math.pow(1+mr, n) / (Math.pow(1+mr, n) - 1);
  }

  function selectKW(kw) {
    curKW = kw;
    document.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('kbtn-' + kw).classList.add('active');
    updateCalc();
  }

  function onCalcSlider(val) {
    curBill = parseInt(val);
    document.getElementById('calc-bill-display').textContent = fmt(val);
    updateCalc();
  }

  function updateCalc() {
    const s = systems[curKW];
    const net = s.price - s.subsidy;
    const monthlyUnits = curKW * 90;
    const savings = Math.min(monthlyUnits * 5, curBill * 0.85);
    const annualSavings = savings * 12;
    const payback = annualSavings > 0 ? net / annualSavings : 99;
    const lifetime = savings * 12 * 25;
    const profit = lifetime - net;
    const emi = calcEMI(net, 9, 84);

    document.getElementById('calc-r-pay').textContent = fmt(net);
    document.getElementById('calc-r-save').textContent = fmt(savings);
    document.getElementById('calc-r-save-sub').textContent = '~' + monthlyUnits + ' units/month est.';
    document.getElementById('calc-r-payback').textContent = (Math.round(payback * 10) / 10) + ' yrs';
    document.getElementById('calc-r-emi').textContent = net > 200000 ? fmt(emi) + '/mo' : 'Full pay';
    document.getElementById('calc-r-emi-sub').textContent = net > 200000 ? '9% · 7 yrs · JK Bank' : 'Net cost below ₹2L threshold';
    document.getElementById('cbk-cost').textContent = fmt(s.price);
    document.getElementById('cbk-central').textContent = '− ' + fmt(s.centralSub);
    document.getElementById('cbk-jk').textContent = '− ' + fmt(s.jkSub);
    document.getElementById('cbk-net').textContent = fmt(net);
    document.getElementById('cbk-note').textContent = s.note;
    document.getElementById('calc-lt-val').textContent = fmt(lifetime);
    document.getElementById('calc-lt-profit').textContent = profit > 0 ? fmt(profit) : '—';
  }

  updateCalc();

  // ===== FORM SUBMIT =====
  function submitForm() {
    const name = document.querySelector('.form-input[type="text"]').value.trim();
    const phone = document.querySelector('.form-input[type="tel"]').value.trim();
    if (!name || !phone) {
      alert('Please fill in your name and phone number.');
      return;
    }
    const msg = encodeURIComponent(`Hello Valley Solars! My name is ${name}. I would like to book a free solar site visit. Please contact me at your earliest convenience.`);
